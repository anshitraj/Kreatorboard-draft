packages:
  "framer-motion": "For premium page transitions and staggered list animations"
  "recharts": "For the analytics and social metrics charts on the dashboard"
  "date-fns": "For formatting dates in the calendar, inbox, and sync jobs"
  "react-day-picker": "Required for Shadcn calendar components"

images:
